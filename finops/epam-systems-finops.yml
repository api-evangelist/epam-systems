reconciled: false
tags:
  - FinOps
  - FOCUS
  - Software Engineering
  - Consulting
description: 'FinOps view of EPAM Systems: invoicing is contract-driven (T&M, fixed-fee, or managed-service
  retainers) rather than usage-metered. The FOCUS shape is closer to professional-services billing than
  to a metered API.'
sources:
  - https://www.epam.com
  - https://developer.epam.com
notes: No public pricing or metered billing. FinOps controls focus on engagement-level budget tracking
  rather than per-API consumption.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: EPAM Systems, Inc.
serviceCategory: IT Services / Consulting
billingModel:
  pricingCategory: Custom Contract / Professional Services
  billingFrequency: Monthly (per SOW)
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: EPAM Systems
  ServiceCategory: IT Services / Consulting
  ProviderName: EPAM Systems
  PublisherName: EPAM Systems, Inc.
  InvoiceIssuerName: EPAM Systems, Inc.
  BillingCurrency: USD
meters:
  - name: engagement_fees
    unit: month
    aggregation: sum
    dimensions:
      - sow
      - cost_center
  - name: time_and_materials_hours
    unit: hour
    aggregation: sum
    dimensions:
      - role
      - sow
principles:
  - name: Visibility
    description: Track EPAM SOW spend in your AP system; reconcile invoices monthly against agreed milestones
      or T&M caps.
  - name: Allocation
    description: Tag SOWs with the consuming business unit/product so engagement spend can be allocated.
  - name: Optimization
    description: Right-size engagement scope; renegotiate rates at renewal; fold managed-service work
      into fixed-fee where volume is predictable.
  - name: Accountability
    description: Engagement owner (named on the SOW) approves invoices; finance reviews variance from
      forecast monthly.
