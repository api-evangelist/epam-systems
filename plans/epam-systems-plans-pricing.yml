    name: Enterprise / Custom Engagement
    type: enterprise
    description: API access is provided to enterprise customers and partners as part of a custom EPAM
      consulting or platform engagement. Scope, quotas, and price are negotiated per SOW.
    entries:
      - label: Custom contract
        name: enterprise_contract
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Custom statement of work
      - name: Negotiated API quotas
      - name: Enterprise integration
