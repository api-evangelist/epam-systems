description: EPAM Systems is a Fortune 1000 IT services and consulting company. It does not publish a
  public price list for its API services; engagements are scoped and priced via custom statement-of-work
  contracts negotiated directly with EPAM. Any platform/API access is granted to enterprise customers
  and partners as part of those engagements.
sources:
  - https://www.epam.com
  - https://developer.epam.com
notes: No public pricing for the EPAM Systems API surface; pricing is custom and contract-based. Reconcile
  with your specific EPAM master services agreement / SOW.
plans:
