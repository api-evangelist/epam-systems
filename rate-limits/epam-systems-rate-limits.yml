specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: EPAM Systems
providerId: epam-systems
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Software Engineering
  - Consulting
description: EPAM Systems does not publish public rate-limit documentation for its API. Limits are configured
  per customer engagement and communicated as part of the integration onboarding for that contract.
sources:
  - https://developer.epam.com
notes: No public rate-limit documentation. Replace with the limits provided in your specific engagement's
  integration guide.
responseCodes:
  throttled: 429
limits:
  - name: Per-customer negotiated limit
    scope: customer/contract
    metric: varies
    limit: see customer engagement integration guide
policies:
  - name: Contract-defined
    description: Rate limits are determined per contract; consumers should consult their EPAM integration
      lead for the applicable quotas and burst behavior.
  - name: Backoff
    description: On 429 responses, apply exponential backoff with jitter and contact the EPAM technical
      account manager if throttling is sustained.
maintainers:
